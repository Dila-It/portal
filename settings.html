<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系統設定 — IT-CTS 系統入口</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 未登入時由 auth.js 導回 index.html -->
<div id="appShell" class="app-shell">

  <!-- 頂部導覽 -->
  <nav class="top-nav">
    <a href="index.html" class="nav-brand">
      <div class="brand-icon">🏛</div>
      IT-CTS 系統入口
    </a>
    <div class="nav-right">
      <span class="nav-user" id="navUserEmail"></span>
      <button class="btn btn-secondary" id="backBtn" style="padding:6px 14px;font-size:13px">← 返回入口</button>
      <button class="btn btn-danger" id="logoutBtn" style="padding:6px 14px;font-size:13px">登出</button>
    </div>
  </nav>

  <!-- 設定主內容 -->
  <div class="settings-wrap">

    <div class="settings-header">
      <h2>⚙ 系統設定</h2>
      <p>管理各系統參數與 Portal 公告，設定儲存後立即生效。</p>
    </div>

    <!-- 公告欄設定 -->
    <div class="settings-card">
      <div class="settings-card-header">
        <div class="s-icon" style="background:linear-gradient(135deg,#4f8ef7,#7c3aed)">📢</div>
        <div>
          <h3>入口公告</h3>
          <p>顯示於 Portal 首頁頂部的全系統公告</p>
        </div>
      </div>
      <div class="settings-card-body">
        <div class="settings-row">
          <div class="settings-label">
            啟用公告
            <small>開啟後公告列顯示於首頁</small>
          </div>
          <label class="toggle">
            <input type="checkbox" id="annEnabled">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-row">
          <div class="settings-label">
            公告內容
            <small>簡短說明，建議 50 字以內</small>
          </div>
          <input type="text" id="annText" placeholder="例：3/15 智慧待辦維護中，預計 14:00 恢復">
        </div>
        <div class="ann-preview" id="annPreview"></div>
        <div class="settings-actions">
          <button class="btn btn-primary" id="saveAnnBtn">儲存公告</button>
        </div>
      </div>
    </div>

    <!-- 布告欄管理 -->
    <div class="section-title" style="margin-top:32px">布告欄管理</div>
    <div class="settings-card">
      <div class="settings-card-header">
        <div class="s-icon" style="background:linear-gradient(135deg,#059669,#10b981)">📋</div>
        <div>
          <h3>布告欄</h3>
          <p>管理顯示於 Portal 首頁右側的公告項目</p>
        </div>
      </div>
      <div class="settings-card-body">
        <div class="bulletin-mgmt-list" id="bulletinMgmtList">
          <div style="color:var(--text-muted);font-size:13px">載入中...</div>
        </div>
        <div class="bulletin-add-form">
          <input type="text" id="newBulletinTitle" placeholder="標題（必填）" maxlength="60">
          <textarea id="newBulletinContent" placeholder="內容說明（選填）" rows="3"></textarea>
          <div style="display:flex;gap:10px;align-items:center">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
              <input type="checkbox" id="newBulletinPin">
              置頂
            </label>
            <button class="btn btn-primary" id="addBulletinBtn" style="flex:1">新增公告</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 各系統設定（由 settings.js 動態渲染） -->
    <div class="section-title" style="margin-top:32px">各系統參數</div>
    <div id="systemsContainer"></div>

  </div>

</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
